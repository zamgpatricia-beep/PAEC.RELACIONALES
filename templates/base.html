<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App PAEC {% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Paleta de colores personalizada */
        .bg-green-100 { background-color: #e8f5e9; } 
        .bg-green-200 { background-color: #83b385; } 
        .bg-green-300 { background-color: #a5d6a7; } 
        .text-green-200 { color: #83b385; }
        .border-green-300 { border-color: #a5d6a7 !important; }

        .bg-teal-100 { background-color: #e0f2f1; } 
        .bg-pink-100 { background-color: #fce4ec; } 
        .bg-pink-900 { background-color: #880e4f; }  
        .text-pink-900 { color: #880e4f; }

        /* Estilo para que el footer siempre esté abajo */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }

        /* Hover personalizado para el menú */
        .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-green-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-pink-900 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                <i class="bi bi-flower1 me-2"></i>App PAEC
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{ url_for('index') }}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{ url_for('quimica') }}">Química</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{ url_for('historia') }}">Historia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 fw-bold" href="{{ url_for('calcular_imc') }}">
                            <i class="bi bi-calculator me-1"></i>IMC
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block contenido %}
        {% endblock %}
    </main>

    <footer class="bg-pink-900 text-white text-center py-3">
        <div class="container">
            <small>Proyecto PAEC 2026. 𓇼 ⋆.˚ 𓆉</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
